<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a2332"/>
      <stop offset="100%" stop-color="#0b1120"/>
    </radialGradient>
  </defs>
  <circle cx="16" cy="16" r="16" fill="url(#bg)"/>
  <!-- Radar rings -->
  <circle cx="16" cy="16" r="13" fill="none" stroke="#3b82f6" stroke-width="0.5" opacity="0.3"/>
  <circle cx="16" cy="16" r="9" fill="none" stroke="#3b82f6" stroke-width="0.5" opacity="0.5"/>
  <circle cx="16" cy="16" r="5" fill="none" stroke="#3b82f6" stroke-width="0.5" opacity="0.7"/>
  <!-- Radar sweep -->
  <polygon points="16,16 16,3 28,16" fill="#3b82f6" opacity="0.4"/>
  <line x1="16" y1="16" x2="28" y2="16" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="16" cy="16" r="2" fill="#60a5fa"/>
  <!-- Blips -->
  <circle cx="22" cy="9" r="1.5" fill="#22c55e" opacity="0.9"/>
  <circle cx="12" cy="22" r="1" fill="#f59e0b" opacity="0.7"/>
</svg>
